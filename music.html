<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music | Iki</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.x/dist/pixi.min.js"></script>
</head>
<body>
    <header class="custom-header">
        <img src="img/logo.png" alt="Logo" class="main-logo">
        <nav class="cat-nav">
            <a href="index.html"><img src="img/btn-home.png" alt="Home"></a>
            <a href="books.html"><img src="img/btn-books.gif" alt="Books"></a>
            <a href="music.html"><img src="img/btn-music.gif" alt="Music"></a>
            <a href="games.html"><img src="img/btn-games.png" alt="Games"></a>
            <a href="more.html"><img src="img/btn-more.png" alt="More"></a>
        </nav>
    </header>

    <main class="main-content">
        <div class="grid-games">
            
            <div class="game-slot featured">
                <div class="card-container">
                    <div class="tv-lines"></div>
                    <img src="img/music-1.jpg" alt="Latest Release" class="game-thumb">
                    <div class="game-info">
                        <h3>ROCKING HORSE GLITTERED</h3>
                        <p>NEW INSTRUMENTAL ALBUM - 2026</p>
                    </div>
                </div>
            </div>

            <div class="games-row">
                
                <div class="game-slot">
                    <div class="card-container">
                        <img src="img/music-2.jpg" alt="Composition 2" class="game-thumb">
                        <div class="game-info">
                            <h3>SSENDAS</h3>
                            <p>THE MAGIC (2019)</p>
                        </div>
                    </div>
                </div>

                <div class="game-slot">
                    <div class="card-container">
                        <img src="img/music-3.jpg" alt="Composition 3" class="game-thumb">
                        <div class="game-info">
                            <h3>SSENDAS</h3>
                            <p>IN NOWHERE (2017)</p>
                        </div>
                    </div>
                </div>

            </div> 
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Iki - Argentina</p>
    </footer>

    <script src="js/music-pixi.js"></script>
</body>
</html>
