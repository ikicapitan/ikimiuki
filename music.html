<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music | Iki</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="music-content.css">
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.x/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@pixi-spine/all-3.8@4.x/dist/pixi-spine-3.8.js"></script>
</head>
<body>
    <header class="custom-header">
        <img src="img/logo.png" alt="Logo" class="main-logo">
        <nav class="cat-nav">
            <a href="index.html"><img src="img/btn-home.png" alt="Home"></a>
            <a href="books.html"><img src="img/btn-books.gif" alt="Books"></a>
            <a href="music.html"><img src="img/btn-music.gif" alt="Music"></a>
            <a href="games.html"><img src="img/btn-games.png" alt="Games"></a>
            <a href="more.html"><img src="img/btn-more.png" alt="More"></a>
        </nav>
    </header>

    <main class="main-content">
        <div class="grid-music">
            <div class="music-slot featured">
                <div class="card-container" id="canvas-reel">
                    <div class="tv-lines"></div>
                    <div class="info-reel">
                        <h2 id="reel-title">Cargando...</h2>
                        <p id="reel-subtitle">Iniciando sistema</p>
                    </div>
                    <a href="#" id="reel-link" class="overlay-link"></a>
                </div>
            </div>

            <div class="music-row">
                <div class="music-slot">
                    <div class="card-container">
                        <img src="img/music-2.jpg" alt="Composition 2" class="album-thumb">
                        <div class="music-info">
                            <h3>SSENDAS</h3>
                            <p>THE MAGIC (2019)</p>
                        </div>
                    </div>
                </div>
                <div class="music-slot">
                    <div class="card-container">
                        <img src="img/music-3.jpg" alt="Composition 3" class="album-thumb">
                        <div class="music-info">
                            <h3>SSENDAS</h3>
                            <p>IN NOWHERE (2017)</p>
                        </div>
                    </div>
                </div>
            </div> 
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Iki - Argentina</p>
    </footer>

    <script src="js/main-pixi.js"></script>
</body>
</html>
